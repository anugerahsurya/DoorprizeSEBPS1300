<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrasi Doorprize</title>
  <meta name="description" content="Daftarkan diri Anda untuk kesempatan memenangkan doorprize eksklusif!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --brand: #e8720c;
      --brand-hover: #c25e08;
      --brand-light: #fff7ed;
      --bg: #f9fafb;
      --surface: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --error: #ef4444;
      --error-bg: #fef2f2;
      --success: #10b981;
      --success-bg: #ecfdf5;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .main-container {
      width: 100%;
      max-width: 440px;
      margin: auto;
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .hero h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.5;
    }

    .hero .badge {
      display: inline-block;
      background: var(--brand-light);
      color: var(--brand);
      padding: 6px 16px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-main);
      letter-spacing: -0.01em;
    }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--text-muted);
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-wrapper input::placeholder {
      color: #9ca3af;
    }

    .input-wrapper input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(232, 114, 12, 0.15);
    }

    .input-error {
      color: var(--error);
      font-size: 0.8rem;
      margin-top: 6px;
      display: none;
      align-items: center;
      gap: 6px;
    }

    .input-error.show {
      display: flex;
    }

    /* ===== SUBMIT BUTTON ===== */
    .btn-submit {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--brand);
      color: #ffffff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-submit:hover {
      background: var(--brand-hover);
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-submit .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .btn-submit.loading .btn-text {
      display: none;
    }

    .btn-submit.loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ===== ALERT ===== */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      line-height: 1.4;
    }

    .alert.show {
      display: flex;
    }

    .alert-error {
      background: var(--error-bg);
      border: 1px solid #fecaca;
      color: var(--error);
    }

    .alert-success {
      background: var(--success-bg);
      border: 1px solid #a7f3d0;
      color: var(--success);
    }

    .alert-info {
      background: var(--brand-light);
      border: 1px solid #fed7aa;
      color: var(--brand);
    }

    /* ===== LOADING SCREEN ===== */
    #loadingScreen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    #loadingScreen.show {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    .large-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top: 4px solid var(--brand);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px auto;
    }

    .loading-text {
      color: var(--text-main);
      font-size: 1rem;
      font-weight: 500;
    }

    /* ===== SUCCESS / ALREADY SCREEN ===== */
    #successScreen,
    #alreadyScreen {
      display: none;
    }

    #successScreen.show,
    #alreadyScreen.show {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-content {

    }

    .result-icon {

    }

    .success-title {

      color: var(--text-main);

      letter-spacing: -0.01em;
    }

    .success-subtitle {
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* ===== TICKET ===== */
    .ticket-wrapper {
      margin: 20px auto;
      max-width: 100%;
    }

    .ticket-wrapper canvas {
      width: 100%;
      height: auto;
      border-radius: var(--radius);
      display: block;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);

    }

    .btn-download:hover {
      background: var(--brand-hover);
      transform: translateY(-1px);
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
  </style>
</head>

  <script>
    // ============================================================

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzQZv4SPme3z69hcV09bOhnyzjmqTNqgeN4vgOCGQUOiuc8HfE_pPkqQiuVrQlmiAU/exec";
    const STORAGE_KEY = "doorprize_registered";
    let userIp = "";

    // ============================================================
    // DOM
    // ============================================================

    const formScreen = document.getElementById("formScreen");

    // ============================================================
    // GET DEVICE ID (Representing device uniquely)
    // ============================================================
    async function getUserIp() {
      const DEVICE_KEY = "doorprize_device_uuid";
      let deviceId = "";
      try {
        deviceId = localStorage.getItem(DEVICE_KEY);
      } catch (e) {
        console.error("Storage access blocked:", e);
      }

      if (!deviceId) {
        if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
          deviceId = crypto.randomUUID();
        } else {
          deviceId = 'dev_' + Math.random().toString(36).substring(2, 15) + '_' + Date.now().toString(36);
        }
        try {
          localStorage.setItem(DEVICE_KEY, deviceId);
        } catch (e) {
          console.error("Failed to save device UUID:", e);
        }
      }
      return deviceId;
    }

    // ============================================================
    // FETCH DENGAN RETRY (Untuk menangani 500 users / load tinggi)
    // ============================================================
    async function fetchWithRetry(url, options, retries = 3, backoff = 1000) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url, options);
          if (res.ok) return res;
          // Jangan retry jika error client (kecuali 429 Too Many Requests)
          if (res.status !== 429 && res.status >= 400 && res.status < 500) {
            return res;
          }
        } catch (err) {
          if (i === retries - 1) throw err;
        }
        await new Promise(r => setTimeout(r, backoff * (i + 1)));
      }
      throw new Error("Max retries reached");
    }

    // ============================================================
    // CHECK IP ON SERVER
    // ============================================================
    async function checkIpOnServer(ip) {
      try {
        const url = `${APPS_SCRIPT_URL}?action=checkIp&ip=${encodeURIComponent(ip)}`;
        const res = await fetchWithRetry(url, { signal: AbortSignal.timeout(10000) });
        return await res.json();
      } catch (e) {
        return { success: false };
      }
    }

    // ============================================================
    // INIT
    // ============================================================
    async function init() {
      // 1. Fast path: cek localStorage
      const savedData = localStorage.getItem(STORAGE_KEY);
      if (savedData) {
        try {
          const data = JSON.parse(savedData);
          showAlreadyRegistered(data.nomorUndian, data.nama);

          // Background check: sinkronisasi dengan server
          userIp = await getUserIp();
          checkIpOnServer(userIp).then(check => {
            if (!check.success || !check.data) {
              // Jika di server ternyata sudah dihapus, hapus memori lokal dan refresh
              localStorage.removeItem(STORAGE_KEY);
              location.reload();
            }
          }).catch(err => console.error("Sync error:", err));

          return;
        } catch (e) {
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      // 2. Cek IP di server
      userIp = await getUserIp();
      if (userIp) {
        const check = await checkIpOnServer(userIp);
        if (check.success && check.data) {
          const save = {
            nomorUndian: check.data.nomorUndian,
            nama: check.data.nama,
            timestamp: new Date().toISOString(),
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(save));
          showAlreadyRegistered(check.data.nomorUndian, check.data.nama);
          return;
        }
      }

      // Jika belum terdaftar, hilangkan loading dan tampilkan form
      loadingScreen.classList.remove("show");
      loadingScreen.style.display = "none";
      formScreen.style.display = "block";
    }

    // ============================================================
    // FORM SUBMIT
    // ============================================================
    registrationForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideAlert();

      const nama = inputNama.value.trim();
      const noHp = inputHp.value.trim();
      let valid = true;

      if (!nama) {
        document.getElementById("errorNama").classList.add("show");
        valid = false;
      } else {
        document.getElementById("errorNama").classList.remove("show");
      }

      const hpClean = noHp.replace(/[\s\-]/g, "");
      if (!hpClean || !/^(\+62|62|08)[1235789][0-9]{7,11}$/.test(hpClean)) {
        document.getElementById("errorHp").classList.add("show");
        valid = false;
      } else {
        document.getElementById("errorHp").classList.remove("show");
      }

      if (!valid) return;

      if (localStorage.getItem(STORAGE_KEY)) {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
        showAlreadyRegistered(data.nomorUndian, data.nama);
        return;
      }

      btnSubmit.classList.add("loading");
      btnSubmit.disabled = true;

      try {
        if (!userIp) userIp = await getUserIp();

        const response = await fetchWithRetry(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ nama, noHp, ip: userIp }),
        });
        const result = await response.json();

        if (result.success) {
          const save = {
            nomorUndian: result.data.nomorUndian,
            nama: result.data.nama,
            timestamp: new Date().toISOString(),
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(save));
          showSuccess(result.data.nomorUndian, result.data.nama);
        } else {
          if (result.data && result.data.nomorUndian) {
            const save = {
              nomorUndian: result.data.nomorUndian,
              nama: result.data.nama || nama,
              timestamp: new Date().toISOString(),
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(save));
            showAlreadyRegistered(save.nomorUndian, save.nama);
          } else {
            showAlert("error", result.message);
          }
        }
      } catch (error) {
        showAlert("error", "Gagal terhubung ke server. Silakan coba lagi.");
      } finally {
        btnSubmit.classList.remove("loading");
        btnSubmit.disabled = false;
      }
    });

    // ============================================================
    // HELPERS
    // ============================================================
    function showAlert(type, message) {
      formAlert.className = `alert alert-${type} show`;
      const iconError = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 16px; height: 16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>`;
      const iconSuccess = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 16px; height: 16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
      const iconInfo = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 16px; height: 16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" /></svg>`;

      alertIcon.innerHTML = type === "error" ? iconError : type === "success" ? iconSuccess : iconInfo;
      alertMsg.textContent = message;
    }

    function hideAlert() {
      formAlert.className = "alert";
    }

    async function showSuccess(nomorUndian, nama) {
      if (loadingScreen) loadingScreen.style.display = "none";
      formScreen.style.display = "none";
      alreadyScreen.style.display = "none";
      successScreen.classList.add("show");
      await drawTicket("ticketCanvas", nomorUndian, nama);

    }

    async function showAlreadyRegistered(nomorUndian, nama) {
      if (loadingScreen) loadingScreen.style.display = "none";
      formScreen.style.display = "none";
      successScreen.style.display = "none";
      alreadyScreen.classList.add("show");
      await drawTicket("ticketCanvasExisting", nomorUndian, nama);
    }

    // ============================================================
    // DRAW TICKET (Orange-White theme)
    // ============================================================
    async function drawTicket(canvasId, nomorUndian, nama) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext("2d");
      const W = canvas.width;
      const H = canvas.height;

      // Background
      ctx.fillStyle = "#ffffff";
      roundRect(ctx, 0, 0, W, H, 20);
      ctx.fill();

      // Top orange bar
      ctx.fillStyle = "#e8720c";
      roundRectTop(ctx, 0, 0, W, 8, 20);
      ctx.fill();

      // Border
      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = 2;
      roundRect(ctx, 1, 1, W - 2, H - 2, 20);
      ctx.stroke();

      // Inner dashed border
      ctx.setLineDash([6, 5]);
      ctx.strokeStyle = "#f3d5b5";
      ctx.lineWidth = 1;
      roundRect(ctx, 16, 16, W - 32, H - 32, 14);
      ctx.stroke();
      ctx.setLineDash([]);

      // Title
      ctx.fillStyle = "#e8720c";
      ctx.font = "600 14px 'Inter', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("PENCANANGAN SENSUS EKONOMI 2026", W / 2, 58);

      // Subtitle
      ctx.fillStyle = "#9ca3af";
      ctx.font = "400 12px 'Inter', sans-serif";
      ctx.fillText("NOMOR UNDIAN", W / 2, 82);

      // Separator
      ctx.strokeStyle = "#f3d5b5";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(60, 98);
      ctx.lineTo(W - 60, 98);
      ctx.stroke();

      // Nomor Undian
      ctx.fillStyle = "#e8720c";
      ctx.font = "800 64px 'Inter', monospace";
      ctx.textAlign = "center";
      ctx.fillText(nomorUndian, W / 2, 185);

      // Separator 2
      ctx.beginPath();
      ctx.moveTo(60, 210);
      ctx.lineTo(W - 60, 210);
      ctx.stroke();

      // Nama label
      ctx.fillStyle = "#9ca3af";
      ctx.font = "400 11px 'Inter', sans-serif";
      ctx.fillText("TERDAFTAR ATAS NAMA", W / 2, 240);

      // Nama
      ctx.fillStyle = "#111827";
      ctx.font = "600 20px 'Inter', sans-serif";
      const displayName = nama.length > 30 ? nama.substring(0, 30) + "..." : nama;
      ctx.fillText(displayName.toUpperCase(), W / 2, 270);

      // Tanggal
      const now = new Date();
      const tgl = now.toLocaleDateString("id-ID", { day: "numeric", month: "long", year: "numeric" });
      const wkt = now.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
      ctx.fillStyle = "#9ca3af";
      ctx.font = "400 11px 'Inter', sans-serif";
      ctx.fillText(`${tgl} • ${wkt} WIB`, W / 2, 310);

      // Bottom badge
      const bW = 250, bH = 28;
      const bX = (W - bW) / 2, bY = H - 52;
      ctx.fillStyle = "#fff7ed";
      roundRect(ctx, bX, bY, bW, bH, 14);
      ctx.fill();
      ctx.strokeStyle = "#fed7aa";
      ctx.lineWidth = 1;
      roundRect(ctx, bX, bY, bW, bH, 14);
      ctx.stroke();
      ctx.fillStyle = "#e8720c";
      ctx.font = "600 10px 'Inter', sans-serif";
      ctx.fillText("SIMPAN KUPON INI UNTUK UNDIAN HADIAH", W / 2, bY + 18);

      // Draw QR Code
      if (typeof QRCode !== 'undefined') {
        try {
          const qrText = `Nomor Undian: ${nomorUndian}\nNama: ${nama}`;
          const qrDataUrl = await QRCode.toDataURL(qrText, {
            errorCorrectionLevel: 'M',
            margin: 1,
            width: 100,
            color: {
              dark: '#111827',
              light: '#ffffff'
            }
          });
          const img = new Image();
          await new Promise((resolve) => {
            img.onload = resolve;
            img.src = qrDataUrl;
          });

          const qrX = W - 130;
          const qrY = H - 140;
          ctx.drawImage(img, qrX, qrY, 100, 100);

          ctx.fillStyle = "#9ca3af";
          ctx.font = "500 10px 'Inter', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("Scan Validasi", qrX + 50, qrY + 115);
        } catch (e) {
          console.error("QR Code error", e);
        }
      }
    }

    // ============================================================
    // CANVAS HELPERS
    // ============================================================
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function roundRectTop(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h);
      ctx.lineTo(x, y + h);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ============================================================
    // DOWNLOAD
    // ============================================================
    function downloadTicket() {
      downloadCanvasImage(document.getElementById("ticketCanvas"));
    }

    function downloadTicketExisting() {
      downloadCanvasImage(document.getElementById("ticketCanvasExisting"));
    }

    function downloadCanvasImage(canvas) {
      const link = document.createElement("a");
      link.download = "nomor-undian-doorprize.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }



    // ============================================================
    // INPUT FORMATTING
    // ============================================================
    inputHp.addEventListener("input", function () {
      this.value = this.value.replace(/[^0-9+\-\s]/g, "");
    });

    inputNama.addEventListener("input", function () {
      document.getElementById("errorNama").classList.remove("show");
    });

    inputHp.addEventListener("input", function () {
      document.getElementById("errorHp").classList.remove("show");
    });

    // ============================================================
    // START
    // ============================================================
    window.addEventListener("DOMContentLoaded", init);
  </script>
